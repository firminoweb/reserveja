    <rect x="3" y="9" width="58" height="50" rx="6" fill="none" stroke="#ffffff" stroke-width="4.5"/>
    <line x1="3" y1="24" x2="61" y2="24" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="19" y1="3" x2="19" y2="15" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="45" y1="3" x2="45" y2="15" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
    <polyline points="15,40 26,51 49,32" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
