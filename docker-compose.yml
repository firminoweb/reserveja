services:
  postgres:
    image: postgres:16-alpine
    container_name: reserveja-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reserveja
      POSTGRES_PASSWORD: reserveja
      POSTGRES_DB: reserveja
    ports:
      - "5432:5432"
    volumes:
      - reserveja_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reserveja -d reserveja"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  reserveja_pg_data:
